<!DOCTYPE html>
<html lang="ru" style="color-scheme: light;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Платёжная ссылка - MVP</title>
    <link rel="icon" type="image/png" href="assets/t-business-short.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @font-face {
            font-family: 'T-Sans';
            src: url('fonts/T-Sans_Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'T-Sans';
            src: url('fonts/T-Sans_Medium.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'T-Sans';
            src: url('fonts/T-Sans_Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro';
            src: url('fonts/SFProText-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro';
            src: url('fonts/SFProText-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro';
            src: url('fonts/SFProText-Semibold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro';
            src: url('fonts/SFProText-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        * {
            font-family: 'SF Pro', system-ui, -apple-system, sans-serif;
            letter-spacing: -0.03em;
        }
        html {
            color-scheme: light;
        }
        @media (prefers-color-scheme: dark) {
            html {
                color-scheme: light !important;
            }
            body {
                background-color: #FFFFFF !important;
                color: #000000 !important;
            }
        }
        :root {
            --primary: #428BF9;
            --accent: #FFDD2D;
            --background: #FFFFFF;
            --foreground: #000000;
            --border: #E5E7EB;
            --muted: #F9FAFB;
            --tui-background-base-alt: #f6f7f8;
            --tui-border-normal: rgba(0, 16, 36, 0.12);
            --tui-text-primary: rgba(0, 0, 0, 0.8);
            --tui-text-secondary: rgba(0, 0, 0, 0.54);
            --tui-text-tertiary: rgba(0, 0, 0, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        .nav-tab {
            padding: 22px 0;
            font-size: 13px;
            line-height: 20px;
            color: var(--tui-text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            border: none;
            border-bottom: 2px solid transparent;
            background: none;
            font-weight: 400;
            white-space: nowrap;
        }
        .nav-tab:hover {
            color: var(--tui-text-primary);
        }
        .nav-tab.active {
            color: var(--tui-text-primary);
            border-bottom-color: var(--tui-text-secondary);
        }
        nav {
            background-color: var(--tui-background-base-alt);
        }
        #previewContent input:focus,
        #previewContent textarea:focus,
        #previewContent .preview-input:focus {
            border-color: #DED0BB !important;
            box-shadow: 0 0 0 2px rgba(222, 208, 187, 0.2) !important;
        }
        .notification-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background-color: #D6F4DD;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: flex-start;
            overflow: hidden;
            min-width: 280px;
            max-width: 400px;
            animation: slideInFromRight 0.3s ease-out;
        }
        .notification-toast-left {
            display: none;
        }
        .notification-toast-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .notification-toast-content {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .notification-toast-text {
            font-size: 13px;
            line-height: 20px;
            color: rgba(0, 0, 0, 0.8);
            font-weight: 400;
        }
        .notification-toast-close {
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .notification-toast-close:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        .notification-toast-close-icon {
            width: 16px;
            height: 16px;
        }
        .scrollbar-hide {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        @keyframes slideInFromRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOutToRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        .notification-toast.hiding {
            animation: slideOutToRight 0.3s ease-out forwards;
        }
        #previewContainer {
            display: flex !important;
            justify-content: center !important;
            align-items: flex-start !important;
            width: 100% !important;
        }
        .payment-header {
            background-color: var(--tui-background-base-alt);
            border-bottom: 1px solid var(--tui-border-normal);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .payment-header-brand {
            display: flex;
            align-items: center;
            gap: 22px;
            flex: 0 1 auto;
            min-width: 94px;
            height: 32px;
        }
        .payment-header-logo {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            height: 32px;
        }
        .payment-header-logo img {
            height: 100%;
            width: auto;
            display: block;
        }
        .payment-header-flag {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 4px 8px;
            background-color: rgba(36, 74, 127, 0.06);
            border-radius: 100px;
            flex-shrink: 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .payment-header-flag:hover {
            background-color: rgba(36, 74, 127, 0.1);
        }
        .payment-header-flag-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .payment-header-flag-stripe {
            position: absolute;
            left: 0;
            right: 0;
        }
        .payment-header-flag-stripe.white {
            top: 0;
            height: 33.33%;
            background: #ffffff;
        }
        .payment-header-flag-stripe.blue {
            top: 33.33%;
            height: 33.33%;
            background: #0052b4;
        }
        .payment-header-flag-stripe.red {
            bottom: 0;
            height: 33.33%;
            background: #d80027;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-white min-h-screen">
    <div id="app">
        <!-- Navigation Header -->
        <nav class="bg-[var(--tui-background-base-alt)] border-b border-[var(--tui-border-normal)]">
            <!-- First Level Navigation -->
            <div class="max-w-[1286px] mx-auto flex items-center justify-between h-16 px-4 md:px-8">
                <!-- Left Side -->
                <div class="flex items-center gap-4 md:gap-8 flex-1 min-w-0">
                    <!-- Logo -->
                    <div class="flex items-center flex-shrink-0">
                        <img src="assets/t-business.png" alt="Т-Бизнес" class="h-9 w-auto hidden md:block">
                        <img src="assets/t-business-short.png" alt="Т-Бизнес" class="h-9 w-auto block md:hidden">
                    </div>
                    <!-- Menu Tabs -->
                    <div class="flex items-center gap-6 h-full overflow-x-auto scrollbar-hide min-w-0 flex-1">
                        <div class="flex items-center gap-6 h-full min-w-max">
                            <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveTab('payments', this)">
                                Счета и платежи
                            </button>
                            <button class="nav-tab active whitespace-nowrap flex-shrink-0" onclick="setActiveTab('acquiring', this)">
                                Интернет-эквайринг
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Right Side -->
                <div class="flex items-center gap-4">
                    <!-- Search Icon -->
                    <button class="hidden md:flex w-8 h-8 items-center justify-center text-[var(--tui-text-secondary)] hover:text-[var(--tui-text-primary)] transition-colors" title="Поиск">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>
                    <!-- Profile -->
                    <div class="flex items-center gap-2 bg-white rounded-xl px-2 md:px-3 py-2">
                        <span class="text-[13px] text-[var(--tui-text-secondary)] hidden md:inline">ООО «Трояна»</span>
                        <div class="w-8 h-8 bg-[var(--tui-text-tertiary)] rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Second Level Navigation -->
            <div class="max-w-[1286px] mx-auto h-16 border-t border-[var(--tui-border-normal)] relative">
                <div class="h-full overflow-x-auto scrollbar-hide">
                    <div class="flex items-center gap-6 px-4 md:px-8 min-w-max h-full">
                        <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('main', this)">
                            Главное
                        </button>
                        <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('operations', this)">
                            Операции
                        </button>
                        <button type="button" class="nav-tab nav-tab-accounts-intermediate whitespace-nowrap flex-shrink-0" data-intermediate-tab="accounts" style="display: none;">
                            Счета
                        </button>
                        <button class="nav-tab active whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('accounts', this)">
                            Платежные ссылки
                        </button>
                        <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('reimbursement', this)">
                            Возмещение
                        </button>
                        <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('shops', this)">
                            Магазины
                        </button>
                        <button class="nav-tab whitespace-nowrap flex-shrink-0" onclick="setActiveSubTab('blacklist', this)">
                            Черный список
                        </button>
                    </div>
                </div>
                <button type="button" id="prototypeModeSwitcher" class="prototype-mode-switcher" onclick="togglePrototypeMode()" aria-label="Переключить режим прототипа">
                    <span class="prototype-mode-switcher-dot" aria-hidden="true"></span>
                    <span class="prototype-mode-switcher-label" id="prototypeModeLabel">Целевая схема</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-[1286px] mx-auto">
            <!-- Settings Panel -->
            <aside class="w-full border-b border-gray-200 bg-transparent" style="height: calc(100vh - 128px); overflow-y: auto;">
                <div class="p-4 md:p-6">
                    <div class="mb-6">
                        <div class="payment-links-header-row">
                            <h2 class="payment-links-title">Платежные ссылки</h2>
                            <button onclick="openCreateModal()" class="payment-links-create-btn">
                                Создать ссылку
                            </button>
                        </div>
                        <div class="payment-links-divider"></div>
                        <div class="payment-links-search-wrap">
                            <div class="payment-links-search-row">
                                <div class="payment-links-search-select-wrap">
                                    <svg class="payment-links-search-select-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                    </svg>
                                    <select id="searchMode" onchange="handleSearchChange()" class="payment-links-search-select">
                                        <option value="merchant">По магазину</option>
                                        <option value="title">По названию</option>
                                    </select>
                                </div>
                                <input id="searchInput" type="text" oninput="handleSearchChange()" placeholder="Название или ID" class="payment-links-search-input">
                            </div>
                        </div>
                        <div class="payment-links-content-layout">
                            <div class="payment-links-list-col">
                                <div id="linksList" class="payment-links-list"></div>
                            </div>
                            <div class="payment-links-sidebar">
                                <div class="sidebar-banner-carousel" aria-label="Промо-баннеры">
                                    <div class="sidebar-banner-track sidebar-banner-track-target" data-banner-track="target">
                                        <div class="sidebar-banner-slide is-active" data-slide-index="0">
                                            <img src="assets/banner_shablon.png" alt="Баннер с шаблоном" class="sidebar-banner-image">
                                        </div>
                                        <div class="sidebar-banner-slide" data-slide-index="1">
                                            <img src="assets/banner_MAX.png" alt="Баннер MAX" class="sidebar-banner-image">
                                        </div>
                                    </div>
                                    <div class="sidebar-banner-track sidebar-banner-track-intermediate" data-banner-track="intermediate">
                                        <div class="sidebar-banner-slide is-active" data-slide-index="0">
                                            <img src="assets/banner_symma.png" alt="Баннер промежуточного сценария" class="sidebar-banner-image">
                                        </div>
                                    </div>
                                    <div class="sidebar-banner-dots">
                                        <button class="sidebar-banner-dot is-active" data-banner-dot="0" onclick="switchSidebarBannerSlide(0)" aria-label="Показать баннер 1"></button>
                                        <button class="sidebar-banner-dot" data-banner-dot="1" onclick="switchSidebarBannerSlide(1)" aria-label="Показать баннер 2"></button>
                                    </div>
                                </div>
                                <div class="faq-card">
                                    <h3 class="faq-card-title">Частые вопросы</h3>
                                    <div class="faq-card-list faq-card-list-target">
                                        <a href="#" class="faq-link">Как создать платежную ссылку?</a>
                                        <a href="#" class="faq-link">Как создать многоразовую ссылку?</a>
                                        <a href="#" class="faq-link">Где посмотреть статус платежа в истории</a>
                                    </div>
                                    <div class="faq-card-list faq-card-list-intermediate">
                                        <a href="#" class="faq-link">Как создать многоразовую ссылку?</a>
                                        <a href="#" class="faq-link">Где посмотреть статус платежа в истории</a>
                                        <a href="#" class="faq-link">Как изменить формат суммы?</a>
                                    </div>
                                </div>
                                <div class="feedback-card">
                                    <h3 class="feedback-card-title">Как вам раздел «Платежные ссылки»?</h3>
                                    <div class="feedback-card-actions">
                                        <button onclick="setFeedbackReaction('sad')" class="feedback-icon" data-reaction="sad" title="Плохо">
                                            <img src="assets/face-frown.svg" alt="Плохо" class="feedback-icon-img">
                                        </button>
                                        <button onclick="setFeedbackReaction('neutral')" class="feedback-icon" data-reaction="neutral" title="Нормально">
                                            <img src="assets/face-neutral.svg" alt="Нормально" class="feedback-icon-img">
                                        </button>
                                        <button onclick="setFeedbackReaction('happy')" class="feedback-icon" data-reaction="happy" title="Отлично">
                                            <img src="assets/face-smile.svg" alt="Отлично" class="feedback-icon-img">
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Modal for Create/Edit -->
        <div id="modalOverlay" onclick="if(event.target === this) closeModal();" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center" style="display: none;">
            <div id="modalTopBar" class="modal-topbar" style="display: none;" onclick="event.stopPropagation();"></div>
            <div id="modalContent" onclick="event.stopPropagation();" class="relative bg-white rounded-lg max-w-2xl w-full mx-4 overflow-visible">
                <!-- Modal content will be inserted here -->
            </div>
            <div id="modalSaveBar" class="modal-save-bar" style="display: none;" onclick="event.stopPropagation();">
                <button id="modalDisableButton" class="modal-disable-btn" style="display: none;">Отключить</button>
                <button id="modalSaveButton" class="modal-save-btn">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="./src/core/state.js"></script>
    <script src="./src/features/render.js"></script>
    <script src="./src/features/actions.js"></script>

</body>
</html>
